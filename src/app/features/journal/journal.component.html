<section class="journal-page">
  <article class="glass-card form-card">
    <div class="header">
      <div>
        <span class="muted">Trade Journal</span>
        <h1>Neuen Trade erfassen</h1>
        <p class="muted">
          Erfasse Entry, Exit, P/L, Setup, Tags und deine Notizen.
        </p>
      </div>

      <button type="button" class="ghost-button" (click)="resetDemoData()">
        Demo-Daten zurücksetzen
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="trade-form">
      <label>
        Datum
        <input type="date" formControlName="date" />
      </label>

      <label>
        Symbol
        <input formControlName="symbol" placeholder="z. B. EUR/USD" />
      </label>

      <label>
        Richtung
        <select formControlName="direction">
          <option value="long">Long</option>
          <option value="short">Short</option>
        </select>
      </label>

      <label>
        Entry Price
        <input type="number" step="0.00001" formControlName="entryPrice" />
      </label>

      <label>
        Exit Price
        <input type="number" step="0.00001" formControlName="exitPrice" />
      </label>

      <label>
        Position Size
        <input type="number" step="0.01" formControlName="positionSize" />
      </label>

      <label>
        Profit / Loss
        <input type="number" step="0.01" formControlName="profitLoss" />
      </label>

      <label>
        Risk Reward Ratio
        <input type="number" step="0.01" formControlName="riskRewardRatio" />
      </label>

      <label>
        Setup
        <input formControlName="setup" placeholder="z. B. Breakout" />
      </label>

      <label>
        Tags
        <input formControlName="tags" placeholder="Discipline, A+ Setup" />
      </label>

      <label class="full">
        Notizen
        <textarea rows="5" formControlName="notes" placeholder="Was war gut? Was war schlecht?"></textarea>
      </label>

      <button class="primary-button" type="submit">
        Trade speichern
      </button>
    </form>
  </article>
</section>
