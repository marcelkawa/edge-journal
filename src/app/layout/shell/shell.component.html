<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">EJ</div>
      <div>
        <strong>Edge Journal</strong>
        <span>Trading Dashboard</span>
      </div>
    </div>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/journal" routerLinkActive="active">Journal</a>
      <a routerLink="/trades" routerLinkActive="active">Trades</a>
      <a class="disabled">Analytics</a>
      <a class="disabled">Calendar</a>
      <a class="disabled">Settings</a>
    </nav>

    <div class="sidebar-card">
      <span class="muted">Winning Streak</span>
      <strong>12 Tage</strong>
      <div class="mini-line"></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="search">
        <span>⌕</span>
        <input placeholder="Search trades, tags, notes..." />
      </div>

      <div class="top-actions">
        <button class="icon-button">🔔</button>

        <div class="account-chip">
          <span class="status"></span>
          <div>
            <strong>Main Account</strong>
            <small>$50,000 Demo</small>
          </div>
        </div>

        <div class="profile-chip">
          <div class="avatar">M</div>
          <div>
            <strong>Marcel</strong>
            <small>Trader</small>
          </div>
        </div>
      </div>
    </header>

    <router-outlet />
  </main>
</div>
